services:
  - type: web
    name: election-engine
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      cd v1/frontend &&
      rm -rf .next out node_modules/.cache &&
      npm install &&
      npx next build &&
      echo "BUILD HASH:" && ls out/_next/static/chunks/app/page-*.js 2>/dev/null
    startCommand: cd v1/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: election-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: NODE_VERSION
        value: 20.11.0
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
