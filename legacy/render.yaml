services:
  - type: web
    name: election-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.8
